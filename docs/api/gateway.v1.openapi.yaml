openapi: 3.1.0
info:
  title: Astrixa API Gateway
  version: 1.0.0
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready
  /v1/chat/completions:
    post:
      summary: Route a chat completion request through Astrixa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                type: string
components:
  schemas:
    Message:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        stream:
          type: boolean
          default: false
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
    ChatCompletionResponse:
      type: object
      required: [id, model, provider, output_text]
      properties:
        id:
          type: string
        model:
          type: string
        provider:
          type: string
        output_text:
          type: string

