global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http
    timeout connect 5s
    timeout client  120s
    timeout server  120s
    option httplog

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid 10s

frontend gateway_in
    bind *:8080
    default_backend gateway_back

backend gateway_back
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200
    server-template gateway 2 api-gateway:8080 check resolvers docker init-addr libc,none resolve-prefer ipv4
