global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: astrixa-api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: astrixa-routing-engine
    static_configs:
      - targets: ["routing-engine:8080"]

  - job_name: astrixa-provider-registry
    static_configs:
      - targets: ["provider-registry:8080"]

  - job_name: astrixa-agent-registry
    static_configs:
      - targets: ["agent-registry:8080"]

  - job_name: astrixa-auth-layer
    static_configs:
      - targets: ["auth-layer:8080"]

  - job_name: astrixa-guardrails-engine
    static_configs:
      - targets: ["guardrails-engine:8080"]

  - job_name: astrixa-anonymization-engine
    static_configs:
      - targets: ["anonymization-engine:8080"]

  - job_name: astrixa-mock-llm
    static_configs:
      - targets: ["mock-llm:8080"]

  - job_name: astrixa-node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
